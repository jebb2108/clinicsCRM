<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в систему</title>
  <link rel="stylesheet" href="/src/css/auth.css">
</head>
<body>
  <div class="auth-container">
    <!-- Квадратное лого над полями -->
    <div class="logo">
      <img src="/src/images/logo.png" alt="Логотип">
    </div>
    <!-- Форма -->
    <div class="auth-content">
      <form id="login-form">
        <div class="form-group">
          <select id="role-select">
            <option value="">-- Выберите роль --</option>
            <option value="admin">Администратор</option>
            <option value="surgeon">Хирург</option>
            <option value="nurse">Оперсестра</option>
            <option value="engineer">Инженер</option>
          </select>
        </div>
        <div class="form-group">
          <input type="text" id="login-input" placeholder="Логин" required>
        </div>
        <div class="form-group">
          <input type="password" id="password-input" placeholder="Пароль" required>
        </div>
        <button id="login-btn" type="submit">Войти</button>
        <p id="error-msg" class="error-message"></p>
      </form>
    </div>
  </div>
  <script src="/src/js/storage.js"></script>
  <script src="/src/js/auth.js"></script>
</body>
</html>
